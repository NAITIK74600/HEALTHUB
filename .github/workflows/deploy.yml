name: Deploy to cPanel

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger deploy webhook
        run: |
          curl -s -X POST https://www.batlamedicos.shop/deploy.php \
            -H "X-Deploy-Token: ${{ secrets.DEPLOY_SECRET }}" \
            --max-time 60 \
            --retry 2 \
            -w "\nHTTP Status: %{http_code}\n"
