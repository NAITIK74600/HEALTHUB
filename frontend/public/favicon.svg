<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48">
  <defs>
    <!-- Main shield gradient -->
    <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#E53935"/>
      <stop offset="60%"  stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#7B241C"/>
    </linearGradient>
    <!-- Top highlight on shield -->
    <linearGradient id="shieldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.38)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.00)"/>
    </linearGradient>
    <!-- Green band gradient -->
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#1B8843"/>
      <stop offset="100%" stop-color="#27AE60"/>
    </linearGradient>
    <!-- Drop shadow -->
    <filter id="drop" x="-15%" y="-15%" width="130%" height="145%">
      <feDropShadow dx="0" dy="3" stdDeviation="2.5" flood-color="#7B241C" flood-opacity="0.5"/>
    </filter>
    <!-- Glow for cross -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="b"/>
      <feComposite in="SourceGraphic" in2="b" operator="over"/>
    </filter>

    <style>
      /* Continuous gentle float + subtle rotation */
      @keyframes bm-float {
        0%,100% { transform: translateY(0)   rotate(0deg);   }
        30%      { transform: translateY(-2px) rotate(1.5deg);  }
        70%      { transform: translateY(1px)  rotate(-1deg);   }
      }
      /* Pulse glow on the cross */
      @keyframes bm-pulse {
        0%,100% { opacity:1;   }
        50%      { opacity:0.82; }
      }
      /* Shimmer sweep across shield */
      @keyframes bm-shimmer {
        0%   { transform: translateX(-60px) skewX(-18deg); opacity:0; }
        20%  { opacity:0.25; }
        60%  { opacity:0.15; }
        100% { transform: translateX(60px)  skewX(-18deg); opacity:0; }
      }
      .bm-body    { animation: bm-float   3.4s ease-in-out infinite; transform-origin:24px 26px; transform-box:fill-box; }
      .bm-cross   { animation: bm-pulse   2s   ease-in-out infinite; }
      .bm-shimmer { animation: bm-shimmer 3.4s ease-in-out infinite; }
    </style>
  </defs>

  <!-- ── Shield body ── -->
  <g class="bm-body" filter="url(#drop)">

    <!-- Shield silhouette -->
    <path d="M24 4 L41 11 L41 27 C41 36.5 33 43 24 46 C15 43 7 36.5 7 27 L7 11 Z"
          fill="url(#shieldGrad)"/>

    <!-- Top-face bevel (lighter edge) -->
    <path d="M24 4 L41 11 L41 12.5 L24 5.5 L7 12.5 L7 11 Z"
          fill="rgba(255,255,255,0.22)"/>

    <!-- Shine overlay (top half of shield) -->
    <path d="M24 4 L41 11 L41 22 C41 22 35 20 24 20 C13 20 7 22 7 22 L7 11 Z"
          fill="url(#shieldShine)"/>

    <!-- Green accent band -->
    <rect x="7" y="30" width="34" height="5" rx="1" fill="url(#greenGrad)" opacity="0.85"/>

    <!-- Shimmer sweep (clipped inside shield) -->
    <clipPath id="sc"><path d="M24 4 L41 11 L41 27 C41 36.5 33 43 24 46 C15 43 7 36.5 7 27 L7 11 Z"/></clipPath>
    <rect x="0" y="0" width="14" height="50" fill="rgba(255,255,255,0.18)" class="bm-shimmer" clip-path="url(#sc)"/>

    <!-- ── Medical cross ── -->
    <g class="bm-cross" filter="url(#glow)">
      <!-- Vertical bar shadow (depth) -->
      <rect x="22.5" y="13.5" width="6" height="17" rx="2.5" fill="rgba(0,0,0,0.15)"/>
      <!-- Horizontal bar shadow -->
      <rect x="14.5" y="20.5" width="20" height="5.5" rx="2.5" fill="rgba(0,0,0,0.15)"/>
      <!-- Vertical bar -->
      <rect x="22" y="13" width="5.5" height="17" rx="2.5" fill="white"/>
      <!-- Horizontal bar -->
      <rect x="14" y="20" width="20" height="5.5" rx="2.5" fill="white"/>
      <!-- Cross inner highlight -->
      <rect x="22.5" y="13.5" width="2.5" height="7" rx="1" fill="rgba(255,255,255,0.6)"/>
    </g>
  </g>
</svg>
  <defs>
    <!-- 3D base gradient — top lit -->
    <linearGradient id="base3d" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#EF5350"/>
      <stop offset="50%"  stop-color="#C0392B"/>
      <stop offset="100%" stop-color="#7B241C"/>
    </linearGradient>
    <!-- Top face highlight -->
    <linearGradient id="topFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FF7043"/>
      <stop offset="100%" stop-color="#E53935"/>
    </linearGradient>
    <!-- Right side shadow face -->
    <linearGradient id="sideFace" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#922B21"/>
      <stop offset="100%" stop-color="#641E16"/>
    </linearGradient>
    <!-- Cross bar top lit -->
    <linearGradient id="crossTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E0E0E0" stop-opacity="0.85"/>
    </linearGradient>
    <!-- Drop shadow filter -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="1.5" dy="3" stdDeviation="2" flood-color="#7B241C" flood-opacity="0.55"/>
    </filter>
    <!-- Inner glow on cross -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.6" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <style>
      @keyframes bm-spin {
        0%   { transform: rotateY(0deg) rotateX(4deg); }
        50%  { transform: rotateY(18deg) rotateX(-2deg); }
        100% { transform: rotateY(0deg) rotateX(4deg); }
      }
      @keyframes bm-pulse {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0.88; }
      }
      .bm-cube   { animation: bm-spin 4s ease-in-out infinite; transform-origin: 24px 24px; transform-box: fill-box; }
      .bm-cross  { animation: bm-pulse 2s ease-in-out infinite; }
    </style>
  </defs>

  <!-- ── 3D CUBE body ── -->
  <g class="bm-cube" filter="url(#shadow)">
    <!-- Bottom-right side face (dark, depth illusion) -->
    <path d="M39 10 L44 15 L44 38 L39 33 Z" fill="url(#sideFace)" opacity="0.9"/>
    <!-- Bottom face strip -->
    <path d="M9 33 L39 33 L44 38 L14 38 Z" fill="#7B241C" opacity="0.85"/>
    <!-- Main front face -->
    <rect x="9" y="10" width="30" height="23" rx="5" fill="url(#base3d)"/>
    <!-- Top-face 3D bevel highlight -->
    <path d="M9 10 Q9 6 14 5.5 L39 5.5 Q43 6 44 10 L39 10 Q38 7 34 7 L14 7 Q11 7 9 10 Z" fill="url(#topFace)" opacity="0.7"/>
    <!-- Rim highlight top edge -->
    <rect x="9" y="9.5" width="30" height="2" rx="1" fill="rgba(255,255,255,0.3)"/>
  </g>

  <!-- ── Cross (+ / medical symbol) ── -->
  <g class="bm-cross" filter="url(#glow)">
    <!-- Vertical bar -->
    <rect x="21" y="13" width="6" height="17" rx="2.5" fill="url(#crossTop)"/>
    <!-- Horizontal bar -->
    <rect x="14" y="19" width="20" height="5.5" rx="2.5" fill="url(#crossTop)"/>
    <!-- 3D edge on vertical bar right -->
    <rect x="26.5" y="13" width="1" height="17" rx="0.5" fill="rgba(0,0,0,0.12)"/>
    <!-- 3D edge on horizontal bar bottom -->
    <rect x="14" y="24" width="20" height="0.8" rx="0.4" fill="rgba(0,0,0,0.12)"/>
  </g>
</svg>
